<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本日の火水おみくじ 🔥☔｜心体調整塾</title>
<meta name="description" content="今日の火水からのメッセージを引こう。毎日ランダムで60種類の応援メッセージ。">
<meta property="og:title" content="本日の火水おみくじ 🔥☔｜心体調整塾">
<meta property="og:description" content="今日の火水からのメッセージを引こう。30種類の応援メッセージ。">
<meta property="og:url" content="https://kamimikuji.pages.dev">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --fire: #D94F1E;
  --fire2: #FF7A40;
  --water: #1A5FB8;
  --water2: #4A9EF5;
  --dark: #0F0F1A;
  --mid: #5A5A7A;
  --cream: #FAFAF5;
}

*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:auto;}

body{
  font-family:'Noto Sans JP',sans-serif;
  background:var(--dark);
  color:white;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── ORB BG ── */
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;}
.orb{
  position:absolute;border-radius:50%;filter:blur(90px);
  animation:orbDrift 14s ease-in-out infinite alternate;
}
.orb-fire{
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(217,79,30,0.35),transparent 70%);
  top:-150px;left:-150px;
}
.orb-water{
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(26,95,184,0.35),transparent 70%);
  bottom:-150px;right:-150px;
  animation-direction:alternate-reverse;
}
.orb-mid{
  width:300px;height:300px;
  background:radial-gradient(circle,rgba(150,100,200,0.15),transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  animation-duration:20s;
}
@keyframes orbDrift{
  from{transform:translate(0,0) scale(1);}
  to{transform:translate(30px,30px) scale(1.08);}
}

/* ── NOISE ── */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9999;opacity:0.4;
}

/* ── LAYOUT ── */
.container{
  position:relative;z-index:1;
  max-width:520px;
  margin:0 auto;
  padding:48px 24px 80px;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
}

/* ── HEADER ── */
.site-badge{
  font-size:11px;letter-spacing:4px;
  color:rgba(255,255,255,0.35);
  text-transform:uppercase;
  margin-bottom:40px;
  border-bottom:1px solid rgba(255,255,255,0.1);
  padding-bottom:16px;
  width:100%;text-align:center;
}

.title-area{text-align:center;margin-bottom:48px;}
.kigo{font-size:40px;margin-bottom:12px;animation:floatIcon 4s ease-in-out infinite;}
@keyframes floatIcon{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}
.main-title{
  font-family:'Noto Serif JP',serif;
  font-size:clamp(22px,6vw,32px);
  font-weight:900;
  letter-spacing:3px;
  background:linear-gradient(135deg,#FF9060,#ffffff 50%,#6AC0FF);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:8px;
}
.catch-copy{
  font-family:'Noto Serif JP',serif;
  font-size:clamp(13px,3.2vw,16px);
  font-weight:400;
  letter-spacing:3px;
  line-height:2.2;
  margin-bottom:12px;
  background:linear-gradient(135deg,#FF9060 0%,#ffffff 50%,#6AC0FF 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.sub-title{
  font-size:12px;letter-spacing:2px;
  color:rgba(255,255,255,0.4);
  line-height:1.8;
}

/* ── CARD ── */
.card-area{
  width:100%;
  margin-bottom:40px;
  display:none;
}
.card-area.show{display:block;}

.omikuji-card{
  width:100%;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:4px;
  padding:40px 32px;
  text-align:center;
  position:relative;
  overflow:hidden;
  min-height:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  transition:border-color 0.5s;
}
.omikuji-card.revealed{
  border-color:rgba(255,255,255,0.2);
}

/* カードの上下ライン */
.omikuji-card::before,.omikuji-card::after{
  content:'';position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,rgba(217,79,30,0),rgba(217,79,30,0.6),rgba(26,95,184,0.6),rgba(26,95,184,0));
}
.omikuji-card::before{top:0;}
.omikuji-card::after{bottom:0;}

.card-bg-glow{
  position:absolute;inset:0;opacity:0;
  transition:opacity 0.8s;
  pointer-events:none;
}
.omikuji-card.revealed .card-bg-glow{opacity:1;}

/* 初期状態 */
.pre-state{
  display:flex;flex-direction:column;align-items:center;gap:16px;
}
.pre-icon{font-size:56px;opacity:0.4;}
.pre-text{
  font-size:14px;letter-spacing:2px;
  color:rgba(255,255,255,0.3);
}

/* 結果状態 */
.result-state{
  display:none;
  flex-direction:column;align-items:center;gap:0;
  width:100%;
}
.omikuji-card.revealed .pre-state{display:none;}
.omikuji-card.revealed .result-state{display:flex;}

.result-element-badge{
  font-size:11px;letter-spacing:3px;
  padding:4px 16px;
  border:1px solid rgba(255,255,255,0.2);
  color:rgba(255,255,255,0.5);
  margin-bottom:20px;
  border-radius:20px;
}

.result-emoji{
  font-size:48px;margin-bottom:16px;
  animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn{
  from{transform:scale(0);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

.result-keyword{
  font-family:'Noto Serif JP',serif;
  font-size:clamp(20px,5vw,26px);
  font-weight:900;
  letter-spacing:2px;
  margin-bottom:20px;
  line-height:1.4;
}

.result-message{
  font-size:14px;
  line-height:2;
  color:rgba(255,255,255,0.75);
  max-width:380px;
  margin-bottom:20px;
}

.result-support{
  font-size:12px;letter-spacing:1px;
  color:rgba(255,255,255,0.35);
  padding-top:16px;
  border-top:1px solid rgba(255,255,255,0.08);
  width:100%;
  text-align:center;
}

/* ── DRAW BUTTON ── */
.draw-btn{
  width:100%;
  max-width:320px;
  padding:20px 0;
  font-family:'Noto Serif JP',serif;
  font-size:16px;
  font-weight:700;
  letter-spacing:3px;
  border:none;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:all 0.3s;
  margin-bottom:16px;
  background:white;
  color:var(--dark);
}
.draw-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--fire2),var(--water2));
  opacity:0;transition:opacity 0.3s;
}
.draw-btn:hover{color:white;}
.draw-btn:hover::after{opacity:1;}
.draw-btn span{position:relative;z-index:1;}

.draw-btn:disabled{
  opacity:0.4;cursor:not-allowed;
}
.draw-btn:disabled:hover{color:var(--dark);}
.draw-btn:disabled:hover::after{opacity:0;}

.retry-text{
  font-size:12px;color:rgba(255,255,255,0.3);
  letter-spacing:1px;text-align:center;
}

/* ── SHARE SECTION ── */
.share-area{
  width:100%;
  display:none;
  flex-direction:column;
  align-items:center;
  gap:12px;
  margin-bottom:40px;
  animation:fadeUp 0.6s ease forwards;
}
.share-area.show{display:flex;}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px);}
  to{opacity:1;transform:translateY(0);}
}

.share-label{
  font-size:11px;letter-spacing:3px;
  color:rgba(255,255,255,0.35);
  text-transform:uppercase;
  margin-bottom:4px;
}

.share-btns{
  display:flex;gap:10px;flex-wrap:wrap;justify-content:center;
}

.share-btn{
  padding:12px 24px;
  border:none;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;
  font-size:13px;font-weight:700;letter-spacing:1px;
  display:flex;align-items:center;gap:8px;
  transition:all 0.2s;
  border-radius:2px;
}
.share-btn.line{background:#00B900;color:white;}
.share-btn.line:hover{opacity:0.85;}
.share-btn.x{background:#000;color:white;border:1px solid #333;}
.share-btn.x:hover{background:#222;}
.share-btn.copy{background:rgba(255,255,255,0.1);color:white;border:1px solid rgba(255,255,255,0.2);}
.share-btn.copy:hover{background:rgba(255,255,255,0.2);}

/* ── FOOTER CTA ── */
.footer-cta{
  width:100%;
  margin-top:48px;
  position:relative;
}

.footer-cta-inner{
  position:relative;
  border-radius:12px;
  overflow:hidden;
  padding:2px;
  background:linear-gradient(135deg,var(--fire),var(--water2),var(--fire2),var(--water));
  background-size:300% 300%;
  animation:gradShift 4s ease infinite;
}
@keyframes gradShift{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.footer-cta-body{
  background:#12122A;
  border-radius:10px;
  padding:32px 24px 28px;
  text-align:center;
  position:relative;
}

.footer-cta-eyebrow{
  font-size:10px;
  letter-spacing:4px;
  color:rgba(255,255,255,0.4);
  text-transform:uppercase;
  margin-bottom:16px;
}

.footer-cta-message{
  font-family:'Noto Serif JP',serif;
  font-size:clamp(20px,5.5vw,26px);
  line-height:1.6;
  letter-spacing:2px;
  margin-bottom:10px;
  background:linear-gradient(135deg,#FF9060,#ffffff 55%,#6AC0FF);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  font-weight:900;
}

.footer-cta-sub{
  font-size:clamp(14px,3.8vw,17px);
  color:rgba(255,255,255,0.75);
  letter-spacing:1px;
  line-height:1.9;
  margin-bottom:24px;
  font-weight:500;
}

.footer-cta-note{
  margin-top:18px;
  font-size:12px;
  color:rgba(255,255,255,0.6);
  letter-spacing:1px;
  line-height:1.9;
}

.footer-cta-link{
  display:block;
  padding:18px 24px;
  background:linear-gradient(135deg,var(--fire),var(--fire2) 40%,var(--water2) 70%,var(--water));
  background-size:200% 200%;
  animation:gradShift 4s ease infinite;
  color:white;
  text-decoration:none;
  font-family:'Noto Serif JP',serif;
  font-size:clamp(14px,3.8vw,17px);
  font-weight:700;
  letter-spacing:2px;
  border-radius:8px;
  transition:transform 0.2s,box-shadow 0.2s;
  box-shadow:0 4px 24px rgba(217,79,30,0.35),0 4px 24px rgba(26,95,184,0.25);
}
.footer-cta-link:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(217,79,30,0.5),0 8px 32px rgba(26,95,184,0.4);
}
.footer-cta-link:active{transform:translateY(0);}

.footer-cta-arrow{
  font-size:18px;margin-right:8px;
  display:inline-block;
  animation:bounceX 1.2s ease-in-out infinite;
}
@keyframes bounceX{
  0%,100%{transform:translateX(0);}
  50%{transform:translateX(5px);}
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:32px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--dark);color:white;
  padding:14px 28px;font-size:13px;letter-spacing:1px;
  z-index:10000;transition:transform 0.3s ease;
  border:1px solid rgba(255,255,255,0.15);
  pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0);}

/* shake animation */
@keyframes shake{
  0%,100%{transform:rotate(0);}
  20%{transform:rotate(-8deg);}
  40%{transform:rotate(8deg);}
  60%{transform:rotate(-5deg);}
  80%{transform:rotate(5deg);}
}
.shaking{animation:shake 0.5s ease;}
</style>
</head>
<body>

<div class="bg-orbs">

</div>

let currentResult = null;
let hasDrawn = false;

function drawOmikuji() {
  const card = document.getElementById('omikuji-card');
  const btn = document.getElementById('draw-btn');

  // shake animation
  const kigo = document.querySelector('.kigo');
  kigo.classList.remove('shaking');
  void kigo.offsetWidth;
  kigo.classList.add('shaking');
  setTimeout(() => kigo.classList.remove('shaking'), 600);

  // pick random
  const idx = Math.floor(Math.random() * OMIKUJI.length);
  currentResult = OMIKUJI[idx];

  // set content
  document.getElementById('result-badge').textContent = currentResult.element;
  document.getElementById('result-emoji').textContent = currentResult.emoji;
  document.getElementById('result-keyword').textContent = currentResult.keyword;
  document.getElementById('result-message').textContent = currentResult.message;
  document.getElementById('result-support').textContent = currentResult.support;

  // glow color
  const glow = document.getElementById('card-bg-glow');
  glow.style.background = `radial-gradient(ellipse at center, ${currentResult.color}, transparent 70%)`;

  // reveal
  card.classList.add('revealed');
  document.getElementById('card-area').classList.add('show');
  document.getElementById('share-area').classList.add('show');

  // button change
  hasDrawn = true;
  document.getElementById('btn-text').textContent = '🎴 もう一度引く';
  document.getElementById('retry-text').textContent = '※ 今日のメッセージは毎回変わります';
}

function buildShareText() {
  if (!currentResult) return '';
  return `🔥☔ 本日の火水おみくじ｜心体調整塾\n\n${currentResult.emoji} ${currentResult.keyword}\n\n${currentResult.message}\n\n━━━━━━━━━━\n${currentResult.support}\n\n👇 あなたも引いてみて\nhttps://kamimikuji.pages.dev`;
}

function shareToLine() {
  const text = buildShareText();
  window.open(`https://line.me/R/share?text=${encodeURIComponent(text)}`, '_blank');
}

  const text = `🔥☔ 本日の火水おみくじ\n\n${currentResult.emoji} ${currentResult.keyword}\n\n${currentResult.message}\n\n#火水性質診断 #心体調整塾\n`;
  const url = 'https://kamimikuji.pages.dev';
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
}

function copyText() {
  const text = buildShareText();
  if (!text) return;
  // clipboard API (https環境)
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text)
      .then(() => showToast('おみくじをコピーしました！'))
      .catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const el = document.createElement('textarea');
  el.value = text;
  el.style.position = 'fixed';
  el.style.left = '-9999px';
  el.style.top = '0';
  document.body.appendChild(el);
  el.focus();
  el.select();
  try {
    document.execCommand('copy');
    showToast('おみくじをコピーしました！');
  } catch(e) {
    showToast('コピーできませんでした。手動でコピーしてください。');
  }
  document.body.removeChild(el);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
