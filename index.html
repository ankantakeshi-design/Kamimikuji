<style>
:root {
  --fire: #D94F1E;
  --fire2: #FF7A40;
  --fire-pale: #FFF2EC;
  --water: #1A5FB8;
  --water2: #4A9EF5;
  --water-pale: #EBF3FF;
  --dark: #0F0F1A;
  --mid: #5A5A7A;
  --light: #F7F6F2;
  --cream: #FAFAF5;
  --border: rgba(0,0,0,0.08);
}

*{box-sizing:border-box;margin:0;padding:0;}

html{scroll-behavior:auto;}

body{
  font-family:'Noto Sans JP',sans-serif;
  background:var(--cream);
  color:var(--dark);
  overflow-x:hidden;
}

/* ── NOISE TEXTURE ── */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' s[...]
  pointer-events:none;
  z-index:9999;
  opacity:0.4;
}

/* ══════════════════════════════
   SCREEN SYSTEM
══════════════════════════════ */
html{
  scroll-behavior: auto;
}
.screen{display:none;}
.screen.active{display:block;}

/* ══════════════════════════════
   HERO
══════════════════════════════ */
#screen-hero{
  min-height:100vh;
  background:var(--dark);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
  padding:40px 24px;
}

.hero-orb{
  position:absolute;
  border-radius:50%;
  filter:blur(80px);
  pointer-events:none;
}
.orb-fire{
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(217,79,30,0.45),transparent 70%);
  top:-100px;left:-100px;
  animation:orbDrift 12s ease-in-out infinite alternate;
}
.orb-water{
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(26,95,184,0.45),transparent 70%);
  bottom:-100px;right:-100px;
  animation:orbDrift 12s ease-in-out infinite alternate-reverse;
}
@keyframes orbDrift{
  from{transform:translate(0,0) scale(1);}
  to{transform:translate(40px,40px) scale(1.1);}
}

.hero-inner{
  position:relative;
  z-index:2;
  text-align:center;
  max-width:640px;
}

.hero-kigo{
  font-size:48px;
  margin-bottom:16px;
  animation:floatIcon 4s ease-in-out infinite;
}
@keyframes floatIcon{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

.hero-badge{
  display:inline-block;
  border:1px solid rgba(255,255,255,0.2);
  color:rgba(255,255,255,0.5);
  font-size:11px;
  letter-spacing:4px;
  padding:6px 20px;
  margin-bottom:32px;
  text-transform:uppercase;
}

.hero-title{
  font-family:'Noto Serif JP',serif;
  font-size:clamp(56px,12vw,108px);
  font-weight:900;
  line-height:0.95;
  letter-spacing:-3px;
  margin-bottom:8px;
  background:linear-gradient(135deg,#FF7A40 0%,#ffffff 45%,#4A9EF5 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

.hero-title-sub{
  font-family:'Noto Serif JP',serif;
  font-size:clamp(16px,3vw,22px);
  font-weight:300;
  color:rgba(255,255,255,0.4);
  letter-spacing:6px;
  margin-bottom:40px;
}

.hero-desc{
  font-size:15px;
  line-height:2;
  color:rgba(255,255,255,0.6);
  margin-bottom:56px;
  max-width:480px;
  margin-left:auto;
  margin-right:auto;
}

.hero-stats{
  display:flex;
  justify-content:center;
  gap:40px;
  margin-bottom:56px;
  flex-wrap:wrap;
}

.stat{text-align:center;}
.stat-num{
  font-family:'Noto Serif JP',serif;
  font-size:36px;
  font-weight:900;
  color:white;
  display:block;
}
.stat-label{
  font-size:11px;
  letter-spacing:2px;
  color:rgba(255,255,255,0.4);
}

.hero-btn{
  background:white;
  color:var(--dark);
  border:none;
  padding:20px 64px;
  font-family:'Noto Serif JP',serif;
  font-size:17px;
  font-weight:700;
  letter-spacing:3px;
  cursor:pointer;
  transition:all 0.3s ease;
  position:relative;
  overflow:hidden;
}
.hero-btn::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,var(--fire2),var(--water2));
  opacity:0;
  transition:opacity 0.3s;
}
.hero-btn:hover{color:white;}
.hero-btn:hover::after{opacity:1;}
.hero-btn span{position:relative;z-index:1;}

/* ══════════════════════════════
   QUIZ
══════════════════════════════ */
#screen-quiz{
  min-height:100vh;
  background:var(--cream);
}

.quiz-header{
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(250,250,245,0.95);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:16px 24px;
}

.quiz-header-inner{
  max-width:720px;
  margin:0 auto;
  display:flex;
  align-items:center;
  gap:16px;
}

.q-num{
  font-family:'Noto Serif JP',serif;
  font-size:13px;
  font-weight:700;
  color:var(--mid);
  white-space:nowrap;
  letter-spacing:1px;
  min-width:64px;
}

.progress-track{
  flex:1;
  height:6px;
  background:rgba(0,0,0,0.08);
  border-radius:3px;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  border-radius:3px;
  background:linear-gradient(90deg,var(--fire),var(--water));
  transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1);
}

.category-tag{
  font-size:11px;
  letter-spacing:2px;
  color:rgba(0,0,0,0.3);
  white-space:nowrap;
  text-transform:uppercase;
}

.quiz-body{
  max-width:680px;
  margin:0 auto;
  padding:56px 24px 80px;
}

.q-category-label{
  font-size:11px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--mid);
  margin-bottom:16px;
  opacity:0.7;
}

.q-text{
  font-family:'Noto Serif JP',serif;
  font-size:clamp(22px,4vw,30px);
  font-weight:700;
  line-height:1.65;
  color:var(--dark);
  margin-bottom:48px;
}

.options-grid{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.opt-btn{
  background:white;
  border:1.5px solid var(--border);
  padding:20px 28px;
  text-align:left;
  cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;
  font-size:15px;
  line-height:1.6;
  color:var(--dark);
  transition:all 0.2s ease;
  position:relative;
  display:flex;
  align-items:center;
  gap:16px;
}

.opt-dot{
  width:10px;height:10px;
  border-radius:50%;
  border:2px solid rgba(0,0,0,0.2);
  flex-shrink:0;
  transition:all 0.2s;
}

.opt-btn:hover{
  border-color:var(--dark);
  transform:translateX(6px);
  background:var(--light);
}
.opt-btn:hover .opt-dot{
  border-color:var(--dark);
  background:var(--dark);
}

/* ══════════════════════════════
   LOADING
══════════════════════════════ */
#screen-loading{
  min-height:100vh;
  background:var(--dark);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:24px;
}

.loading-icon{
  font-size:56px;
  animation:spin 2s linear infinite;
}
@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

.loading-text{
  font-family:'Noto Serif JP',serif;
  font-size:18px;
  color:rgba(255,255,255,0.6);
  letter-spacing:3px;
}

.loading-bar-track{
  width:200px;
  height:2px;
  background:rgba(255,255,255,0.1);
}
.loading-bar-fill{
  height:100%;
  background:linear-gradient(90deg,var(--fire2),var(--water2));
  animation:loadFill 2s ease forwards;
}
@keyframes loadFill{
  from{width:0;}
  to{width:100%;}
}

/* ══════════════════════════════
   RESULT
══════════════════════════════ */
#screen-result{
  background:var(--cream);
}

/* ── RESULT HERO ── */
.result-hero{
  background:var(--dark);
  padding:32px 24px 48px;
  position:relative;
  overflow:hidden;
}

.result-hero-bg{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.result-hero-inner{
  max-width:720px;
  margin:0 auto;
  position:relative;
  z-index:2;
}

.result-name-label{
  font-size:11px;
  letter-spacing:3px;
  color:rgba(255,255,255,0.35);
  margin-bottom:8px;
  text-transform:uppercase;
}

.result-type-name{
  font-family:'Noto Serif JP',serif;
  font-size:clamp(36px,7vw,64px);
  font-weight:900;
  color:white;
  line-height:1.2;
  margin-bottom:16px;
}

.result-type-sub{
  font-size:16px;
  color:rgba(255,255,255,0.5);
  margin-bottom:48px;
  line-height:1.8;
}

/* ── GAUGE ── */
.gauge-section{
  margin-bottom:8px;
}

.gauge-header{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  margin-bottom:10px;
}

.gauge-header-fire{
  font-size:13px;
  font-weight:700;
  letter-spacing:2px;
  color:var(--fire2);
}
.gauge-header-water{
  font-size:13px;
  font-weight:700;
  letter-spacing:2px;
  color:var(--water2);
}

.gauge-track{
  height:32px;
  background:rgba(255,255,255,0.08);
  border-radius:2px;
  overflow:hidden;
  display:flex;
}

.gauge-fire-fill{
  height:100%;
  background:linear-gradient(90deg,var(--fire),var(--fire2));
  transition:width 1.8s cubic-bezier(0.34,1.56,0.64,1);
  display:flex;
  align-items:center;
  justify-content:flex-end;
  padding-right:12px;
}

.gauge-water-fill{
  height:100%;
  background:linear-gradient(90deg,var(--water2),var(--water));
  flex:1;
  display:flex;
  align-items:center;
  padding-left:12px;
}

.gauge-pct-text{
  font-family:'Noto Serif JP',serif;
  font-size:15px;
  font-weight:900;
  color:rgba(255,255,255,0.9);
}

/* ── RESULT BODY ── */
.result-body{
  max-width:720px;
  margin:0 auto;
  padding:56px 24px 100px;
}

/* ── MATURITY INFO ── */
.maturity-info{
  margin-top:24px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.maturity-info-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.mi-card{
  padding:16px;
  border-radius:4px;
  border-left:3px solid;
}
.mi-card.fire-high{background:#fff8f5;border-color:var(--fire);}
.mi-card.fire-low{background:#f8f8f8;border-color:#ccc;}
.mi-card.water-high{background:#f0f6ff;border-color:var(--water);}
.mi-card.water-low{background:#f8f8f8;border-color:#ccc;}
.mi-head{
  font-size:11px;
  font-weight:700;
  letter-spacing:1px;
  margin-bottom:6px;
  color:var(--dark);
}
.mi-text{
  font-size:12px;
  color:var(--mid);
  line-height:1.7;
}
@media(max-width:520px){
  .maturity-info-row{grid-template-columns:1fr;}
}

/* ── MATURITY CARDS ── */
.maturity-section{
  margin-bottom:48px;
}

.section-title{
  font-family:'Noto Serif JP',serif;
  font-size:20px;
  font-weight:700;
  color:var(--dark);
  margin-bottom:20px;
  padding-bottom:12px;
  border-bottom:2px solid var(--dark);
  display:flex;
  align-items:center;
  gap:8px;
}

.maturity-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.maturity-card{
  padding:28px 24px;
  position:relative;
  overflow:hidden;
}

.maturity-card.fire{
  background:var(--fire-pale);
  border-top:4px solid var(--fire);
}
.maturity-card.water{
  background:var(--water-pale);
  border-top:4px solid var(--water);
}

.mc-label{
  font-size:11px;
  letter-spacing:3px;
  font-weight:700;
  margin-bottom:8px;
  text-transform:uppercase;
}
.fire .mc-label{color:var(--fire);}
.water .mc-label{color:var(--water);}

.mc-level{
  font-family:'Noto Serif JP',serif;
  font-size:26px;
  font-weight:900;
  color:var(--dark);
  margin-bottom:8px;
  line-height:1.2;
}

.mc-bar-track{
  height:4px;
  background:rgba(0,0,0,0.08);
  border-radius:2px;
  margin-bottom:12px;
  overflow:hidden;
}
.mc-bar-fill{
  height:100%;
  border-radius:2px;
  transition:width 1.5s ease 0.5s;
}
.fire .mc-bar-fill{background:var(--fire);}
.water .mc-bar-fill{background:var(--water);}

.mc-desc{
  font-size:13px;
  line-height:1.8;
  color:var(--mid);
}

/* ── TYPE DESCRIPTION ── */
.type-desc-card{
  background:white;
  border-left:4px solid var(--dark);
  padding:36px 32px;
  margin-bottom:48px;
}

.type-desc-text{
  font-size:16px;
  line-height:2.2;
  color:var(--mid);
}

/* ── ADVICE CARDS ── */
.advice-section{
  margin-bottom:48px;
}

.advice-cards{
  display:grid;
  gap:16px;
}

.advice-card{
  background:white;
  padding:28px;
  border-top:3px solid transparent;
  position:relative;
}
.advice-card.fire-card{border-color:var(--fire);}
.advice-card.water-card{border-color:var(--water);}

.ac-icon{font-size:24px;margin-bottom:8px;display:block;}
.ac-title{
  font-family:'Noto Serif JP',serif;
  font-size:18px;
  font-weight:700;
  color:var(--dark);
  margin-bottom:10px;
}
.ac-text{
  font-size:14px;
  line-height:2;
  color:var(--mid);
}

/* ── TRAITS ── */
.traits-section{margin-bottom:48px;}

.traits-row{margin-bottom:24px;}
.traits-row-title{
  font-size:13px;
  letter-spacing:2px;
  font-weight:700;
  color:var(--mid);
  margin-bottom:10px;
  text-transform:uppercase;
}

.tags{display:flex;flex-wrap:wrap;gap:8px;}

.tag{
  padding:6px 16px;
  border-radius:20px;
  font-size:13px;
  font-weight:700;
  letter-spacing:0.5px;
}
.tag.fire{background:var(--fire-pale);color:var(--fire);}
.tag.water{background:var(--water-pale);color:var(--water);}
.tag.both{background:#F0F0F0;color:var(--mid);}

/* ── DAILY ── */
.daily-section{
  background:white;
  border:1px solid var(--border);
  border-radius:4px;
  padding:28px 24px;
  margin-bottom:32px;
}
.daily-subtitle{
  font-size:12px;
  color:var(--mid);
  margin-bottom:20px;
  line-height:1.7;
}
.daily-list{display:flex;flex-direction:column;}
.daily-item{
  display:flex;
  gap:14px;
  align-items:flex-start;
  padding:14px 0;
  border-bottom:1px solid var(--border);
}
.daily-item:last-child{border-bottom:none;}
.daily-num{
  width:24px;height:24px;border-radius:50%;
  background:linear-gradient(135deg,var(--fire),var(--water));
  color:white;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
}
.daily-text{font-size:13px;color:var(--dark);line-height:1.8;}

/* ── SHARE & HISTORY ── */
.share-section{
  margin-bottom:48px;
  background:var(--dark);
  padding:40px 32px;
  text-align:center;
}

.share-title{
  font-family:'Noto Serif JP',serif;
  font-size:22px;
  font-weight:700;
  color:white;
  margin-bottom:8px;
}
.share-sub{
  font-size:13px;
  color:rgba(255,255,255,0.4);
  margin-bottom:28px;
  letter-spacing:1px;
}

.share-hint{
  font-size:13px;
  color:rgba(255,255,255,0.45);
  margin-bottom:20px;
  line-height:1.7;
}

.device-block{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:4px;
  padding:20px 20px 16px;
  margin-bottom:12px;
  text-align:left;
}

.device-label{
  font-size:12px;
  letter-spacing:2px;
  color:rgba(255,255,255,0.5);
  margin-bottom:14px;
  font-weight:700;
}

.share-btn-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}

.share-btn-note{
  font-size:11px;
  color:rgba(255,255,255,0.35);
  letter-spacing:0.5px;
  line-height:1.5;
  text-align:center;
  max-width:240px;
  margin-top:6px;
}

.share-group{
  margin-bottom:28px;
}

.share-group-label{
  font-size:11px;
  letter-spacing:3px;
  color:rgba(255,255,255,0.35);
  text-transform:uppercase;
  margin-bottom:14px;
  display:flex;
  align-items:center;
  gap:10px;
  justify-content:center;
}
.share-group-label::before,
.share-group-label::after{
  content:'';
  display:block;
  width:32px;
  height:1px;
  background:rgba(255,255,255,0.15);
}
.share-divider{
  height:1px;
  background:rgba(255,255,255,0.1);
  margin:24px 0;
}

.share-btns{
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
}

.share-btn{
  padding:14px 28px;
  border:none;
  cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;
  font-size:14px;
  font-weight:700;
  letter-spacing:1px;
  transition:all 0.25s;
  display:flex;
  align-items:center;
  gap:8px;
}
.share-btn.img-btn{background:white;color:var(--dark);}
.share-btn.img-btn:hover{background:var(--fire-pale);color:var(--fire);}
.share-btn.x-btn{background:#000;color:white;}
.share-btn.x-btn:hover{background:#333;}
.share-btn.img-line-btn{background:#00B900;color:white;}
.share-btn.img-line-btn:hover{opacity:0.85;}
.share-btn.url-btn{background:rgba(255,255,255,0.1);color:white;border:1px solid rgba(255,255,255,0.2);}
.share-btn.url-btn:hover{background:rgba(255,255,255,0.2);}
.share-btn.line-btn{background:#00B900;color:white;}
.share-btn.line-btn:hover{opacity:0.85;}

/* ── HISTORY ── */
.history-section{
  margin-bottom:48px;
}

.history-list{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.history-item{
  background:white;
  padding:20px 24px;
  display:flex;
  align-items:center;

.profile-section{

}

  display:flex;

  position:relative;
  z-index:1;
}
.profile-avatar-fallback{
  position:absolute;
  inset:0;
  border-radius:50%;
  background:linear-gradient(135deg,var(--fire),var(--water));
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:40px;

  z-index:0;

.profile-school{
  font-size:13px;

}
.profile-bio{
  font-size:13px;

  line-height:1.9;
  margin-bottom:20px;
}
.profile-tags{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:20px;
}
.profile-tag{
  font-size:11px;
  padding:4px 12px;
  border:1px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,0.5);
  border-radius:20px;
  letter-spacing:0.5px;
}
.profile-ig-btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:10px 20px;
  background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);
  color:white;
  text-decoration:none;
  font-size:13px;
  font-weight:700;
  border-radius:4px;
  letter-spacing:1px;
  transition:opacity 0.2s;
}
.profile-ig-btn:hover{ opacity:0.85; }
@media(max-width:520px){
  .profile-inner{flex-direction:column;align-items:center;text-align:center;}
  .profile-tags{justify-content:center;}
  .profile-ig-btn{width:100%;justify-content:center;}
}
